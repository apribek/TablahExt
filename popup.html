<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tablah Quick Menu</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            width: 280px;
            margin: 0;
            padding: 8px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .menu-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 6px;
        }

        .menu-header img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .menu-header h1 {
            font-size: 0.9rem;
            margin: 0;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .menu-item .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 6px;
            color: var(--accent);
        }

        .menu-item svg {
            width: 16px;
            height: 16px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 6px 0;
        }

        #auth-required {
            padding: 12px;
            text-align: center;
            display: none;
        }

        #auth-required p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .btn-sm {
            width: 100%;
            padding: 8px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .menu-footer {
            padding: 8px 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Toggle switch for site enablement */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 18px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px; width: 12px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(14px); }

    </style>
</head>
<body>
    <div class="menu-header">
        <img src="icons/icon48.png" alt="Tablah">
        <h1>Tablah AI</h1>
    </div>

    <div id="auth-required">
        <p>Login to your Tablah account</p>
        <button class="btn-sm" id="btn-login">Open Tablah</button>
    </div>

    <div id="main-menu">
        <div class="menu-item" id="item-score">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <span>Score Job Fit</span>
        </div>

        <div class="menu-item" id="item-chat">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <span>Chat about this Job</span>
        </div>

        <div class="divider"></div>

        <div class="menu-item" id="item-import-job">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </div>
            <span>Import Job</span>
        </div>

        <div class="menu-item" id="item-import-profile">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <span>Import Profile</span>
        </div>

        <div class="divider"></div>

        <div class="menu-footer">
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="site-toggle">
                    <span class="slider"></span>
                </label>
                <span>Enable on site</span>
            </div>
            <span id="version" style="opacity: 0.5;">v1.1</span>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
