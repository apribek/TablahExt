<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tablah Job Chat</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: rgba(255,255,255,0.08);
            --user-bubble: #1d4ed8;
            --ai-bubble: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 13px;
        }

        #header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #header img { width: 24px; height: 24px; border-radius: 4px; }

        #header h1 {
            font-size: 0.95rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #job-banner {
            padding: 8px 16px;
            background: rgba(37,99,235,0.12);
            border-bottom: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #job-banner span { color: var(--accent); font-weight: 600; }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 88%;
            padding: 10px 13px;
            border-radius: 12px;
            line-height: 1.55;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg.user {
            background: var(--user-bubble);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .msg.assistant {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .msg.thinking {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 3px;
            color: var(--text-muted);
        }

        .dot-anim { display: inline-flex; gap: 3px; align-items: center; height: 14px; }
        .dot-anim span {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.2s infinite;
        }
        .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
        .dot-anim span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
        }

        #seeds {
            padding: 0 16px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
        }

        .seed-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--accent);
            font-size: 0.78rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .seed-btn:hover { background: rgba(37,99,235,0.15); }

        #input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #msg-input {
            flex: 1;
            padding: 10px 13px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.88rem;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.4;
            max-height: 100px;
            overflow-y: auto;
        }
        #msg-input:focus { border-color: var(--primary); }
        #msg-input::placeholder { color: var(--text-muted); }

        #send-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        #send-btn:hover { background: var(--primary-hover); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #error-bar {
            display: none;
            padding: 8px 16px;
            background: rgba(239,68,68,0.12);
            color: #f87171;
            font-size: 0.8rem;
            border-top: 1px solid rgba(239,68,68,0.2);
        }

        #loading-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="header">
        <img src="icons/icon48.png" alt="Tablah">
        <h1>Tablah Job Chat</h1>
    </div>

    <div id="job-banner" style="display:none;">
        Viewing: <span id="job-source"></span>
    </div>

    <div id="loading-state">
        <div class="spinner"></div>
        <span>Loading job context…</span>
    </div>

    <div id="chat-ui" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div id="messages"></div>
        <div id="seeds"></div>
        <div id="error-bar"></div>
        <div id="input-area">
            <textarea id="msg-input" rows="1" placeholder="Ask anything about this job…"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="chat-panel.js"></script>
</body>
</html>
