<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TablahExt</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            width: 760px;
            max-height: 580px;
            margin: 0;
            padding: 24px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .tablah-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .tablah-header img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        .tablah-header h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tablah-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }

        .tablah-job-info h2 {
            font-size: 1.1rem;
            margin: 0 0 4px 0;
            color: var(--text);
        }

        .tablah-job-info p {
            font-size: 0.9rem;
            margin: 0;
            color: var(--text-muted);
        }

        .tablah-score-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin: 20px 0;
            position: relative;
        }

        .tablah-score-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            position: relative;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .tablah-score-label {
            margin-top: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .tablah-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tablah-btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .tablah-btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .tablah-btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .tablah-btn-outline:hover {
            background-color: rgba(37, 99, 235, 0.1);
        }

        .tablah-assessment-details {
            margin-top: 20px;
            display: none;
        }

        .tablah-detail-section {
            margin-bottom: 12px;
        }

        .tablah-detail-section h3 {
            font-size: 0.85rem;
            color: var(--accent);
            margin: 0 0 6px 0;
            text-transform: uppercase;
        }

        .tablah-detail-section p {
            font-size: 0.85rem;
            margin: 0;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .tablah-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }

        .tablah-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: tablah-spin 1s linear infinite;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .tablah-loading-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        @keyframes tablah-spin {
            to { transform: rotate(360deg); }
        }

        #tablah-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: none;
            padding: 8px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
        }

        .tablah-auth-required {
            display: none;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="tablah-header">
        <img src="icons/icon48.png" alt="Tablah Logo">
        <h1>Tablah AI</h1>
    </div>

    <div id="tablah-error"></div>

    <div id="tablah-auth-view" class="tablah-auth-required">
        <p>Please log in to your Tablah account to use the extension.</p>
        <button class="tablah-btn-primary" id="tablah-btn-login">Open Tablah</button>
    </div>

    <div id="tablah-main-view">
        <div class="tablah-card tablah-job-info" id="tablah-job-info-card">
            <h2 id="tablah-job-title">Job Title</h2>
            <p id="tablah-job-company">Company Name</p>
        </div>

        <div id="tablah-loading-overlay" class="tablah-loading-overlay">
            <div class="tablah-spinner"></div>
            <p id="tablah-loading-text" class="tablah-loading-text">Analyzing job fit...</p>
        </div>

        <div id="tablah-assessment-result" style="display: none;">
            <div class="tablah-score-container">
                <div class="tablah-score-ring" id="tablah-score-value">--</div>
                <div class="tablah-score-label">Fit Score</div>
            </div>

            <div class="tablah-assessment-details" id="tablah-assessment-details">
                <div class="tablah-detail-section">
                    <h3>Strengths</h3>
                    <p id="tablah-strengths-text"></p>
                </div>
                <div class="tablah-detail-section">
                    <h3>Gap Analysis</h3>
                    <p id="tablah-weaknesses-text"></p>
                </div>
            </div>
        </div>

        <div class="tablah-card tablah-settings" style="margin-top: 10px; padding: 12px; font-size: 0.85rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Show floating widget here</span>
                <input type="checkbox" id="tablah-site-toggle" style="width: auto;">
            </div>
            <p id="tablah-site-host" style="margin: 4px 0 0 0; font-size: 0.75rem; color: var(--text-muted);"></p>
        </div>

        <div class="tablah-actions">
            <button class="tablah-btn-primary" id="tablah-btn-assess">Analyze Fit</button>
            <button class="tablah-btn-outline" id="tablah-btn-import-profile">Import Experiences</button>
            <button class="tablah-btn-outline" id="tablah-btn-import">Import Job</button>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
